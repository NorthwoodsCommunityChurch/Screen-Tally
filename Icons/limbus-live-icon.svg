<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a2744"/>
            <stop offset="50%" style="stop-color:#162040"/>
            <stop offset="100%" style="stop-color:#0d1528"/>
        </linearGradient>
        <radialGradient id="blueGlow" cx="50%" cy="40%" r="50%">
            <stop offset="0%" style="stop-color:rgba(59,130,246,0.12)"/>
            <stop offset="100%" style="stop-color:rgba(59,130,246,0)"/>
        </radialGradient>
        <radialGradient id="redBleed" cx="82%" cy="16%" r="40%">
            <stop offset="0%" style="stop-color:rgba(239,68,68,0.12)"/>
            <stop offset="100%" style="stop-color:rgba(239,68,68,0)"/>
        </radialGradient>
        <radialGradient id="greenBleed" cx="16%" cy="84%" r="40%">
            <stop offset="0%" style="stop-color:rgba(34,197,94,0.10)"/>
            <stop offset="100%" style="stop-color:rgba(34,197,94,0)"/>
        </radialGradient>
        <filter id="redGlow">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="greenGlow">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="liveGlow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="512" height="512" rx="115" fill="url(#bg)"/>
    <rect width="512" height="512" rx="115" fill="url(#blueGlow)"/>
    <rect width="512" height="512" rx="115" fill="url(#redBleed)"/>
    <rect width="512" height="512" rx="115" fill="url(#greenBleed)"/>

    <!-- L-Split Tally Borders -->
    <!-- Red: top + right (PGM) -->
    <path d="M108 104 L404 104 Q424 104 424 124 L424 356" stroke="#ef4444" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#redGlow)"/>
    <!-- Green: left + bottom (PVW) -->
    <path d="M88 136 L88 340 Q88 356 108 356 L396 356" stroke="#22c55e" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#greenGlow)"/>

    <!-- Screen -->
    <rect x="104" y="120" width="308" height="224" rx="6" fill="#0b1020"/>

    <!-- LIVE text on screen -->
    <text x="258" y="250" text-anchor="middle" fill="rgba(239,68,68,0.5)" font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="60" font-weight="800" letter-spacing="10" filter="url(#liveGlow)">LIVE</text>

    <!-- PGM/PVW indicator dots -->
    <circle cx="216" cy="416" r="9" fill="#ef4444"/>
    <circle cx="296" cy="416" r="9" fill="#22c55e"/>
</svg>
